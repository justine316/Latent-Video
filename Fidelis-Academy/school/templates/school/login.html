{% extends "school/base.html" %}
{% load static %}
{% block title %}Student Login &#8212; Fidelis Academy{% endblock %}
{% block body %}
<div class="login-page">
  <div class="login-bg"></div>
  <div class="login-vignette"></div>

  <div class="login-card">
    <span class="login-cross">&#10013;</span>
    <h1 class="login-title">Discipuli</h1>
    <p class="login-subtitle">Student Portal</p>

    {% if error %}
    <p class="login-error">&#10013; Incorrect password. Please try again.</p>
    {% endif %}

    <form method="post" class="login-form">
      {% csrf_token %}
      <input
        type="password"
        name="password"
        class="login-input"
        placeholder="Enter student password"
        autofocus
        autocomplete="current-password"
      />
      <button type="submit" class="login-btn">&#10013;&nbsp; Enter Portal</button>
    </form>

    <a href="{% url 'landing' %}" class="login-back">&#8592; Return to Gate</a>
  </div>
</div>
{% endblock %}
